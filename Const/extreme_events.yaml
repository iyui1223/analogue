events:  
  # February 2020 Antarctic Peninsula heatwave
  - name: "antarctica_peninsula_2020"
    description: "February 2020 Antarctic Peninsula heatwave"
    start_date: "2020-02-01"
    end_date: "2020-02-15"
    snapshot_date: "2020-02-08"
    projection: "sps"  # South Polar Stereographic for Antarctic events
    region:
      lat_min: -85.0
      lat_max: -55.0
      lon_min: 225.0   # -135 + 360
      lon_max: 325.0   # -35 + 360
    gaussian_center:
      lat: -68.0
      lon_deg_east: 296.0   # -64 + 360
      sigma_km: 1000.0
    boxplot_region:
      lat_min: -70.0   # 70S
      lat_max: -60.0   # 60S
      lon_min: 280.0   # 80W (0–360)
      lon_max: 310.0   # 50W (0–360)

