# =============================================================================
# Preprocessing Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Reanalysis Data Source Selection
# -----------------------------------------------------------------------------
reanalysis:
  # Active reanalysis: era5, jra3q, mswx
  active: "era5"
  
  # ERA5 configuration
  era5:
    enabled: true
    variables:
      circulation:
        - name: z500
          file_pattern: "z500_{date}.nc"
          nc_varname: "z"
          level: 500
        - name: msl
          file_pattern: "msl_{date}.nc"
          nc_varname: "msl"
        - name: u850
          file_pattern: "u850_{date}.nc"
          nc_varname: "u"
          level: 850
        - name: v850
          file_pattern: "v850_{date}.nc"
          nc_varname: "v"
          level: 850
      temperature:
        - name: t2m
          file_pattern: "t2m_{date}.nc"
          nc_varname: "t2m"
  
  # JRA-3Q configuration (reanalysis comparison, SLP only)
  # Source: /lustre/soge1/data/analysis/jra-q3/anl_surf125/
  # Format: GRIB2, 6-hourly, 1.25° grid (288x145)
  # File naming: anl_surf125.YYYYMMDDHH (HH = 00, 06, 12, 18)
  # Coverage: 1947-09 to ~1993-09 (download interrupted)
  # Preprocessing: Python/preprocess_jra3q.py -> daily mean SLP, domain-sliced
  jra3q:
    enabled: true
    source_format: "grib2"
    variables:
      circulation:
        - name: msl
          grib_shortname: "prmsl"
          nc_varname: "prmsl"
  
  # MSWX configuration (retained for future use)
  mswx:
    enabled: false
    variables:
      anomaly_vars:
        - name: pres
          file_pattern: "Pres_{date}.nc"
          nc_varname: "pres"
        - name: t2m
          file_pattern: "Tair_{date}.nc"
          nc_varname: "air_temperature"
      raw_vars:
        - name: precip
          file_pattern: "Prec_{date}.nc"
          nc_varname: "precipitation"
        - name: wind10m
          file_pattern: "Wind_{date}.nc"
          nc_varname: "wind_speed"

# -----------------------------------------------------------------------------
# Climatology Configuration
# -----------------------------------------------------------------------------
climatology:
  start_year: 1948
  end_year: 2026

# -----------------------------------------------------------------------------
# Past / Present Period Separation (for attribution analysis)
# -----------------------------------------------------------------------------
periods:
  past:
    start_year: 1948
    end_year: 1987
  present:
    start_year: 1988
    end_year: 2026

# -----------------------------------------------------------------------------
# Processing Flags
# -----------------------------------------------------------------------------
# Set to false to force recomputation
skip_existing:
  climatology: true
  anomaly: true
  yearly_merge: true
  event_bbox: true
